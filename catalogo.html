<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo de Produtos | Brava Materiais de Limpeza</title>
    <meta
      name="description"
      content="Consulte o catalogo de produtos da Brava Materiais de Limpeza por categoria e solicite orcamento pelo WhatsApp."
    >
    <link rel="icon" href="assets/brava-logo.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="catalog">
    <header data-header></header>

    <main>
      <section class="page-hero">
        <div class="container">
          <div class="eyebrow">Catalogo</div>
          <h1 data-catalog-title>Catalogo de produtos</h1>
          <p class="lead" data-catalog-subtitle>
            Consulte produtos de limpeza, higiene, descartaveis, papeis e equipamentos.
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="toolbar">
            <input class="field" type="search" placeholder="Buscar produto, categoria ou codigo" data-search>
            <select class="select" data-sort aria-label="Ordenar produtos">
              <option value="featured">Destaques primeiro</option>
              <option value="name">Nome A-Z</option>
              <option value="category">Categoria</option>
            </select>
          </div>
          <div class="filter-row" data-category-filter></div>
          <div class="product-grid" data-product-list></div>
        </div>
      </section>

      <section class="section cta-band">
        <div class="container">
          <div>
            <div class="eyebrow">Atendimento</div>
            <h2>Achou o produto? Peca o orcamento</h2>
            <p>O botao de cada card ja envia o nome do produto para a equipe Brava pelo WhatsApp.</p>
          </div>
          <a class="button whatsapp" href="https://wa.me/5547999118317" target="_blank" rel="noreferrer">Chamar no WhatsApp</a>
        </div>
      </section>
    </main>

    <footer data-footer></footer>
    <div class="modal" data-modal></div>

    <script src="data/site-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
