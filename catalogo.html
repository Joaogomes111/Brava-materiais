    <title>Catálogo de Produtos | Brava Materiais de Limpeza</title>
    <meta
      name="description"
      content="Consulte o catálogo de produtos da Brava Materiais de Limpeza por categoria e solicite orçamento pelo WhatsApp."
    >
    <link rel="icon" href="assets/logo-brava-materiais.jpeg">
    <link rel="stylesheet" href="styles.css?v=20260625-8">
  </head>
  <body data-page="catalog">
    <header data-header></header>

    <main>
      <section class="page-hero">
        <div class="container">
          <div class="eyebrow">Catálogo</div>
          <h1 data-catalog-title>Catálogo de produtos</h1>
          <p class="lead" data-catalog-subtitle>
            Consulte produtos de limpeza, higiene, descartáveis, papéis e equipamentos.
          </p>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="toolbar">
            <input class="field" type="search" placeholder="Buscar produto, categoria ou código" data-search>
            <select class="select" data-sort aria-label="Ordenar produtos">
              <option value="featured">Destaques primeiro</option>
              <option value="name">Nome A-Z</option>
              <option value="category">Categoria</option>
            </select>
          </div>
          <div class="filter-row" data-category-filter></div>
          <div class="product-grid" data-product-list></div>
        </div>
      </section>

      <section class="section cta-band">
        <div class="container">
          <div>
            <div class="eyebrow">Atendimento</div>
            <h2>Achou o produto? Peça o orçamento</h2>
            <p>O botão de cada card já envia o nome do produto para a equipe Brava pelo WhatsApp.</p>
          </div>
          <a class="button whatsapp" href="https://wa.me/5547999118317" target="_blank" rel="noreferrer">Chamar no WhatsApp</a>
        </div>
      </section>
    </main>

    <footer data-footer></footer>
    <div class="modal" data-modal></div>
